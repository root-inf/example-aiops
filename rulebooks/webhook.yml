---
- name: Listen for events on a webhook
  hosts: localhost

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Create Redmine issue ticket
      condition: >
        event.payload.host_host == "ip-10-0-0-4"
        and event.payload.trigger_name == "Failed to connect web server"
        and event.payload.event_severity == "High"
      action:
        run_job_template:
          name: Create Redmine issue ticket
          organization: Default
          var_root: payload
        #  job_args:
        #   extra_vars:
        #     host_host: "{{ host_host }}"
        #     trigger_name: "{{ trigger_name }}"
        #     event_severity: "{{ event_severity }}"
